<div class="auth-card">
  <div class="brand">
    <svg class="brand-icon" viewBox="0 0 48 40" width="52" height="44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path
        d="M4 20C4 11.16 11.16 4 20 4h8c8.84 0 16 7.16 16 16s-7.16 16-16 16h-8c-2.1 0-4.1-.4-5.94-1.14L6 38l2.4-8.4A15.9 15.9 0 0 1 4 20Z"
        fill="url(#brandGradient)"
      />
      <circle cx="17" cy="20" r="2.4" fill="#fff" />
      <circle cx="24" cy="20" r="2.4" fill="#fff" />
      <circle cx="31" cy="20" r="2.4" fill="#fff" />
      <defs>
        <linearGradient id="brandGradient" x1="4" y1="4" x2="44" y2="36" gradientUnits="userSpaceOnUse">
          <stop stop-color="#6d5ef1" />
          <stop offset="1" stop-color="#4f46e5" />
        </linearGradient>
      </defs>
    </svg>
    <div class="brand-name">Arlo Chat</div>
    <div class="brand-tagline">Conversations, connected.</div>
  </div>

  <h1>Log in</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label for="username">Username</label>
    <input id="username" type="text" formControlName="username" autocomplete="username" />

    <label for="password">Password</label>
    <input id="password" type="password" formControlName="password" autocomplete="current-password" />

    @if (errorMessage()) {
      <p class="error" role="alert">{{ errorMessage() }}</p>
    }

    <button type="submit" [disabled]="isSubmitting()">
      {{ isSubmitting() ? 'Logging in...' : 'Log in' }}
    </button>
  </form>

  <p class="switch-link">
    Don't have an account? <a routerLink="/create-account">Create one</a>
  </p>
</div>
